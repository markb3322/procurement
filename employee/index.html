<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
<title>Dashboard | BEPO-PESO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #0d0f14;
  --bg2: #14171f;
  --bg3: #1c2030;
  --line: rgba(255,255,255,0.07);
  --text: #e8eaf0;
  --text2: #b0b5c0;
  --muted: rgba(232,234,240,0.45);
  --accent: #3b6ef5;
  --gold: #f59e0b;
  --success: #4ade80;
  --danger: #f87171;
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
  --display: 'Playfair Display', Georgia, serif;
  --ease: cubic-bezier(0.4,0,0.2,1);
  --r: 14px;
  --rsm: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: var(--font); 
  background: var(--bg); 
  color: var(--text); 
  min-height: 100vh; 
  padding: 20px;
  padding-top: 100px; /* Space for fixed navbar */
}
.dashboard { 
  width: 100%; 
  max-width: 800px; 
  margin: 0 auto;
  animation: fadeUp 0.5s var(--ease) both; 
}
@keyframes fadeUp { 
  from { opacity: 0; transform: translateY(20px); } 
  to { opacity: 1; transform: translateY(0); } 
}
.topbar { margin-bottom: 28px; }
.greeting h1 { 
  font-family: var(--display); 
  font-size: 28px; 
  font-weight: 700; 
  color: var(--text); 
  letter-spacing: -0.4px; 
  display: flex; 
  align-items: center; 
  gap: 8px; 
}
.greeting h1 .wave { 
  display: inline-block; 
  animation: wave 2s ease-in-out infinite; 
}
@keyframes wave { 
  0%,100% { transform: rotate(0deg); } 
  25% { transform: rotate(-10deg); } 
  75% { transform: rotate(10deg); } 
}
.greeting p { font-size: 13px; color: var(--muted); margin-top: 4px; }
.greeting .time-display { 
  font-size: 11px; 
  font-family: var(--mono); 
  color: var(--muted); 
  margin-top: 2px; 
  opacity: 0.7; 
}
.profile-card { 
  background: var(--bg2); 
  border: 1px solid var(--line); 
  border-radius: 20px; 
  padding: 36px; 
  box-shadow: 0 20px 50px rgba(0,0,0,0.4); 
}
.profile-header { 
  display: flex; 
  align-items: center; 
  gap: 20px; 
  margin-bottom: 28px; 
  flex-wrap: wrap; 
}
.profile-avatar { 
  width: 100px; 
  height: 100px; 
  border-radius: 50%; 
  background: var(--bg3); 
  border: 3px solid var(--gold); 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  overflow: hidden; 
  flex-shrink: 0; 
  background-size: cover; 
  background-position: center; 
}
.profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
.profile-avatar .fallback { font-size: 40px; color: var(--gold); }
.profile-info h2 { 
  font-family: var(--display); 
  font-size: 22px; 
  font-weight: 700; 
  color: var(--text); 
  letter-spacing: -0.3px; 
}
.profile-info .id-badge { 
  display: inline-block; 
  font-family: var(--mono); 
  font-size: 12px; 
  color: var(--accent); 
  background: rgba(59,110,245,0.12); 
  padding: 3px 10px; 
  border-radius: 20px; 
  margin-top: 4px; 
}
.profile-info .status { 
  display: inline-block; 
  font-size: 11px; 
  padding: 3px 10px; 
  border-radius: 20px; 
  margin-left: 6px; 
  font-weight: 600; 
}
.status-active { background: rgba(74,222,128,0.12); color: var(--success); }
.status-inactive { background: rgba(248,113,113,0.12); color: var(--danger); }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.detail-item { background: var(--bg3); border: 1px solid var(--line); border-radius: var(--rsm); padding: 14px 16px; }
.detail-item label { 
  display: block; 
  font-size: 10px; 
  font-weight: 600; 
  color: var(--muted); 
  text-transform: uppercase; 
  letter-spacing: 0.5px; 
  margin-bottom: 4px; 
  font-family: var(--mono); 
}
.detail-item span { font-size: 14px; color: var(--text); font-weight: 500; word-break: break-word; }
.detail-item.full { grid-column: 1 / -1; }
.loading-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.spinner { 
  width: 40px; 
  height: 40px; 
  border: 3px solid var(--line); 
  border-top-color: var(--gold); 
  border-radius: 50%; 
  animation: spin 0.8s linear infinite; 
  margin: 0 auto 16px; 
}
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 600px) { 
  .detail-grid { grid-template-columns: 1fr; } 
  .profile-card { padding: 24px 20px; } 
  .greeting h1 { font-size: 22px; }
  body { padding-top: 140px; }
}
</style>
</head>
<body>

<div class="dashboard">
  <div class="topbar">
    <div class="greeting">
      <h1><span id="greetingText">Good Morning</span> <span class="wave">👋</span></h1>
      <p id="welcomeName">Welcome back</p>
      <div class="time-display" id="phTime">—</div>
    </div>
  </div>

  <div class="profile-card" id="profileCard">
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <p>Loading your profile…</p>
    </div>

    <div id="profileContent" style="display:none;">
      <div class="profile-header">
        <div class="profile-avatar" id="profileAvatar">
          <span class="fallback">👤</span>
        </div>
        <div class="profile-info">
          <h2 id="displayFullname">—</h2>
          <span class="id-badge" id="displayIdNumber">—</span>
          <span class="status" id="displayStatus">—</span>
        </div>
      </div>
      <div class="detail-grid">
        <div class="detail-item"><label>Nickname</label><span id="displayNickname">—</span></div>
        <div class="detail-item"><label>Birthdate</label><span id="displayBirthdate">—</span></div>
        <div class="detail-item"><label>Emergency Contact</label><span id="displayEmergencyName">—</span></div>
        <div class="detail-item"><label>Emergency Number</label><span id="displayEmergencyNumber">—</span></div>
        <div class="detail-item full"><label>Address</label><span id="displayAddress">—</span></div>
      </div>
    </div>
  </div>
</div>

<script src="navbar.js"></script>
<script>
// Wait for navbar to initialize first
document.addEventListener('DOMContentLoaded', async function () {
  
  // Wait a bit for navbar to be ready if needed
  await new Promise(resolve => setTimeout(resolve, 100));

  const SUPABASE_URL = 'https://iharcxdakmyxjpqpcbnb.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloYXJjeGRha215eGpwcXBjYm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODc0NDEsImV4cCI6MjA5NDA2MzQ0MX0.5BE8ckW-3g5mJmXyrDWO_cytfI-_JrMaV4LQip7pbvs';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Check for user session from navbar or sessionStorage
  let userId = sessionStorage.getItem('bepo_user_id');
  let userName = sessionStorage.getItem('bepo_user_name');
  let idNumber = sessionStorage.getItem('bepo_id_number');
  
  // If no session data, try to get from navbar's session
  if (!userId || !idNumber) {
    const navSession = localStorage.getItem('supabase_session');
    if (navSession) {
      try {
        const session = JSON.parse(navSession);
        userId = session.user?.id;
        // Try to fetch member data based on user_id
        if (userId) {
          const { data: memberData } = await supabase
            .from('members')
            .select('id_number, fullname')
            .eq('user_id', userId)
            .single();
          
          if (memberData) {
            idNumber = memberData.id_number;
            userName = memberData.fullname;
            sessionStorage.setItem('bepo_user_id', userId);
            sessionStorage.setItem('bepo_user_name', userName);
            sessionStorage.setItem('bepo_id_number', idNumber);
          }
        }
      } catch(e) {
        console.error('Error reading navbar session:', e);
      }
    }
  }

  if (!userId || !idNumber) {
    window.location.replace('../login.html');
    return;
  }

  function getPHGreeting() {
    const now = new Date();
    const phTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Manila' }));
    const hour = phTime.getHours();
    if (hour >= 5 && hour < 12) return 'Good Morning';
    if (hour >= 12 && hour < 13) return 'Good Noon';
    if (hour >= 13 && hour < 17) return 'Good Afternoon';
    return 'Good Evening';
  }

  function updatePHTime() {
    const now = new Date();
    const options = { 
      timeZone: 'Asia/Manila', 
      hour: '2-digit', 
      minute: '2-digit', 
      second: '2-digit', 
      hour12: true, 
      weekday: 'long', 
      year: 'numeric', 
      month: 'long', 
      day: 'numeric' 
    };
    document.getElementById('phTime').textContent = '🇵🇭 ' + now.toLocaleString('en-US', options) + ' (PH Time)';
  }

  document.getElementById('greetingText').textContent = getPHGreeting();
  document.getElementById('welcomeName').textContent = userName ? `Welcome back, ${userName}` : 'Loading…';
  updatePHTime();
  setInterval(updatePHTime, 1000);

  async function loadProfile() {
    try {
      const { data, error } = await supabase
        .from('members')
        .select('*')
        .eq('id_number', idNumber)
        .single();
      
      if (error || !data) throw new Error('Member not found');

      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('profileContent').style.display = 'block';

      document.getElementById('displayFullname').textContent = data.fullname || '—';
      document.getElementById('displayIdNumber').textContent = data.id_number || '—';
      const statusEl = document.getElementById('displayStatus');
      const isActive = !data.status || data.status === 'Active';
      statusEl.textContent = data.status || 'Active';
      statusEl.className = 'status ' + (isActive ? 'status-active' : 'status-inactive');
      document.getElementById('displayNickname').textContent = data.nickname || '—';
      document.getElementById('displayBirthdate').textContent = data.birthdate || '—';
      document.getElementById('displayEmergencyName').textContent = data.emergency_contact_name || '—';
      document.getElementById('displayEmergencyNumber').textContent = data.emergency_contact_number || '—';
      document.getElementById('displayAddress').textContent = data.address || '—';

      // Update avatar if profile image exists
      if (data.profile_image && (data.profile_image.startsWith('data:image') || data.profile_image.startsWith('http'))) {
        const avatar = document.getElementById('profileAvatar');
        avatar.innerHTML = `<img src="${data.profile_image}" alt="Profile">`;
      }

      // Also update navbar profile info if navbar has update function
      if (window.updateNavbarProfile) {
        window.updateNavbarProfile(data.fullname, data.profile_image);
      }

    } catch (err) {
      console.error('Error loading profile:', err);
      document.getElementById('loadingState').innerHTML = '<p style="color:var(--danger);">Failed to load profile. Please try again later.</p>';
    }
  }

  await loadProfile();
});
</script>
</body>
</html>
