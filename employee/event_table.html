<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
<title>Events | BEPO-PESO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #f0f2f7;
  --surface: #ffffff;
  --surface2: #f7f9fc;
  --border: #e2e8f0;
  --text: #0d1b2e;
  --text2: #4a5a6e;
  --muted: #8a97a8;
  --accent: #1a56db;
  --accent-dark: #1345b7;
  --accent-light: #ebf0ff;
  --green: #0d7e4b;
  --green-bg: #e6f5ec;
  --red: #dc2626;
  --red-bg: #fdecea;
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(13,27,46,0.06), 0 8px 24px rgba(13,27,46,0.07);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }
.main { padding: 28px 32px 40px; max-width: 1000px; margin: 0 auto; animation: fadeUp 0.4s ease both; width: 100%; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.page-header h2 { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.4px; display: flex; align-items: center; gap: 8px; }

.filter-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
.filter-bar label { font-size: 13px; font-weight: 600; color: var(--text2); white-space: nowrap; }
.filter-bar select { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 13px; font-family: var(--font); cursor: pointer; outline: none; }
.filter-bar select:focus { border-color: var(--accent); }
.filter-bar .badge-count { font-size: 12px; color: var(--accent); background: var(--accent-light); padding: 5px 12px; border-radius: 20px; font-weight: 600; margin-left: auto; }

.btn { display: inline-flex; align-items: center; gap: 7px; border: none; border-radius: 10px; padding: 9px 18px; font-size: 13.5px; font-weight: 600; font-family: var(--font); cursor: pointer; transition: all 0.14s ease; white-space: nowrap; text-decoration: none; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); }
.btn-secondary { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--surface2); }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid transparent; }
.btn-danger:hover { background: #fce4e4; border-color: var(--red); }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }

.table-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
thead { background: var(--surface2); border-bottom: 2px solid var(--border); }
th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
td { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
tbody tr:hover { background: var(--accent-light); }
.td-actions { display: flex; gap: 6px; }
.empty-state { text-align: center; padding: 40px; color: var(--muted); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(13,27,46,0.45); backdrop-filter: blur(3px); z-index: 500; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: modalIn 0.2s ease; }
@keyframes modalIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border); }
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-close { width: 30px; height: 30px; border-radius: 8px; border: none; background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--muted); }
.modal-close:hover { background: var(--border); }
.modal-body { padding: 20px 22px; }
.modal-body label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
.modal-body input { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-family: var(--font); outline: none; background: var(--surface2); }
.modal-body input:focus { border-color: var(--accent); background: #fff; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; padding: 14px 22px; border-top: 1px solid var(--border); background: var(--surface2); }

.toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
.toast { background: #0d1b2e; color: #fff; padding: 12px 18px; border-radius: 12px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 30px rgba(0,0,0,0.2); pointer-events: all; animation: slideIn 0.25s ease; }
.toast.success .toast-icon { color: #4ade80; }
.toast.error .toast-icon { color: #f87171; }
@keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

@media (max-width: 600px) { .main { padding: 16px 14px 32px; } }
</style>
</head>
<body>

<main class="main">
  <div class="page-header">
    <h2>📅 Events</h2>
    <button class="btn btn-primary" id="addEventBtn">+ Add Event</button>
  </div>

  <div class="filter-bar">
    <label>Filter by Month:</label>
    <select id="filterMonth" onchange="applyFilter()">
      <option value="">All Months</option>
      <option value="0">January</option><option value="1">February</option><option value="2">March</option>
      <option value="3">April</option><option value="4">May</option><option value="5">June</option>
      <option value="6">July</option><option value="7">August</option><option value="8">September</option>
      <option value="9">October</option><option value="10">November</option><option value="11">December</option>
    </select>
    <span class="badge-count" id="countBadge">0 events</span>
  </div>

  <div class="table-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Event Name</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="4"><div class="empty-state">Loading events…</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Add Event</h3>
      <button class="modal-close" onclick="closeEventModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="eventId" />
      <label>Event Name *</label>
      <input type="text" id="eventName" placeholder="Enter event name" required />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeEventModal()">Cancel</button>
      <button class="btn btn-primary" id="saveEventBtn">💾 Save</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="navbar.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {

  if (window.renderPMSNavbar) renderPMSNavbar();

  const SUPABASE_URL = 'https://iharcxdakmyxjpqpcbnb.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloYXJjeGRha215eGpwcXBjYm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODc0NDEsImV4cCI6MjA5NDA2MzQ0MX0.5BE8ckW-3g5mJmXyrDWO_cytfI-_JrMaV4LQip7pbvs';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let events = [];

  function toast(msg, type) {
    type = type || 'success';
    var d = document.createElement('div');
    d.className = 'toast ' + type;
    d.innerHTML = '<span class="toast-icon">' + (type === 'success' ? '✓' : '✕') + '</span><span>' + msg + '</span>';
    document.getElementById('toastContainer').appendChild(d);
    setTimeout(function() { d.remove(); }, 3000);
  }

  async function loadEvents() {
    try {
      var res = await sb.from('events').select('*').order('created_at', { ascending: false });
      if (res.error) throw res.error;
      events = res.data || [];
      applyFilter();
    } catch (e) {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="4"><div class="empty-state">Failed to load events</div></td></tr>';
    }
  }

  function applyFilter() {
    var monthVal = document.getElementById('filterMonth').value;
    var filtered = events.slice();
    
    if (monthVal !== '') {
      var monthNum = parseInt(monthVal);
      filtered = filtered.filter(function(e) {
        if (!e.created_at) return false;
        return new Date(e.created_at).getMonth() === monthNum;
      });
    }
    
    renderTable(filtered);
  }
  window.applyFilter = applyFilter;

  function renderTable(filtered) {
    var tbody = document.getElementById('tableBody');
    document.getElementById('countBadge').textContent = filtered.length + ' event' + (filtered.length !== 1 ? 's' : '');
    
    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state">No events found for this month</div></td></tr>';
      return;
    }
    
    tbody.innerHTML = filtered.map(function(e) {
      var shortId = (e.id || '').substring(0, 8);
      return '<tr>' +
        '<td style="font-family:var(--mono);font-size:11px;color:var(--muted);">' + shortId + '</td>' +
        '<td><strong>' + esc(e.event_name || '—') + '</strong></td>' +
        '<td style="font-size:12px;color:var(--muted);">' + (e.created_at ? new Date(e.created_at).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' }) : '—') + '</td>' +
        '<td class="td-actions">' +
          '<button class="btn btn-secondary btn-sm" onclick="editEvent(\'' + e.id + '\')">✏️ Edit</button>' +
          '<button class="btn btn-danger btn-sm" onclick="deleteEvent(\'' + e.id + '\')">🗑️ Delete</button>' +
        '</td>' +
      '</tr>';
    }).join('');
  }

  function esc(str) { if (!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  document.getElementById('addEventBtn').addEventListener('click', function() {
    document.getElementById('modalTitle').textContent = 'Add Event';
    document.getElementById('eventId').value = '';
    document.getElementById('eventName').value = '';
    document.getElementById('eventModal').classList.add('open');
    document.getElementById('eventName').focus();
  });

  window.editEvent = function(id) {
    var e = events.find(function(x) { return x.id === id; });
    if (!e) return;
    document.getElementById('modalTitle').textContent = 'Edit Event';
    document.getElementById('eventId').value = e.id;
    document.getElementById('eventName').value = e.event_name || '';
    document.getElementById('eventModal').classList.add('open');
    document.getElementById('eventName').focus();
  };

  window.closeEventModal = function() {
    document.getElementById('eventModal').classList.remove('open');
  };

  document.getElementById('saveEventBtn').addEventListener('click', async function() {
    var id = document.getElementById('eventId').value;
    var name = document.getElementById('eventName').value.trim();
    
    if (!name) { toast('Please enter an event name', 'error'); return; }

    try {
      var res;
      if (id) {
        res = await sb.from('events').update({ event_name: name }).eq('id', id).select();
        if (res.error) throw res.error;
        var idx = events.findIndex(function(x) { return x.id === id; });
        if (idx !== -1) { events[idx].event_name = name; }
        toast('Event updated ✓');
      } else {
        res = await sb.from('events').insert([{ event_name: name }]).select();
        if (res.error) throw res.error;
        if (res.data && res.data.length > 0) { events.unshift(res.data[0]); }
        toast('Event created ✓');
      }
      closeEventModal();
      applyFilter();
    } catch (err) {
      toast('Error: ' + (err.message || 'Failed to save'), 'error');
    }
  });

  window.deleteEvent = async function(id) {
    if (!confirm('Delete this event?')) return;
    try {
      var res = await sb.from('events').delete().eq('id', id);
      if (res.error) throw res.error;
      events = events.filter(function(x) { return x.id !== id; });
      applyFilter();
      toast('Event deleted');
    } catch (e) {
      toast('Delete failed: ' + (e.message || 'Error'), 'error');
    }
  };

  document.getElementById('eventModal').addEventListener('click', function(e) {
    if (e.target === this) closeEventModal();
  });

  document.getElementById('eventName').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('saveEventBtn').click();
  });

  loadEvents();
});
</script>
</body>
</html>
